<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2FA Verification</title>
</head>
<body>
<h2>Two-Factor Authentication</h2>
<p>Please enter the code from your authenticator app.</p>
<form th:action="@{/verify-2fa/submit}" method="post">
  <label>Verification Code:</label>
  <input type="text" name="code" pattern="[0-9]{6}" required> <br/>
  <button type="submit">Verify</button>
</form>
<p th:if="${param.error}" style="color:red">Invalid code</p>

</body>
</html>
